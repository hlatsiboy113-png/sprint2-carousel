<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Web Dev Languages Carousel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Web Development Languages</h1>

  <div class="carousel">

    <button id="prevBtn">⬅</button>

    <div class="card">
      <img id="langImage" alt="Language logo">
      <h2 id="langName"></h2>
      <p id="langDesc"></p>
    </div>

    <button id="nextBtn">➡</button>

  </div>

  <!-- dots -->
  <div id="dotsContainer"></div>

  <!-- fallback message -->
  <p id="status"></p>

  <script src="script.js"></script>
</body>
</html>
